<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>license-manager — Handoff doc</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05050d;
    --bg-1: #0a0a18;
    --bg-2: #10102a;
    --border: #2a2a52;
    --fg: #e6e6ff;
    --fg-dim: #9090c8;
    --fg-mute: #5a5a90;
    --cyan: #00f0ff;
    --magenta: #ff36d4;
    --green: #39ff88;
    --yellow: #ffce39;
    --red: #ff3c5f;
    --violet: #a070ff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: "Inter", system-ui, sans-serif; font-size: 15px; line-height: 1.65; }
  body {
    background:
      radial-gradient(ellipse at 50% 0%, rgba(255,54,212,0.08), transparent 40%),
      radial-gradient(ellipse at 80% 80%, rgba(0,240,255,0.06), transparent 60%),
      var(--bg);
    min-height: 100vh;
  }
  .topbar {
    position: sticky; top: 0; z-index: 10;
    background: rgba(5,5,13,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 10px 28px;
    display: flex; align-items: center; gap: 18px;
    font-family: "JetBrains Mono", monospace; font-size: 13px;
  }
  .topbar .brand { color: var(--magenta); text-shadow: 0 0 8px rgba(255,54,212,0.55); font-weight: 700; letter-spacing: 0.05em; }
  .topbar a { color: var(--cyan); text-decoration: none; }
  .topbar a:hover { text-decoration: underline; text-decoration-color: var(--magenta); }
  main {
    max-width: 1040px;
    margin: 0 auto;
    padding: 32px 32px 80px;
  }
  h1, h2, h3, h4 { font-family: "Inter", sans-serif; line-height: 1.25; letter-spacing: -0.01em; }
  h1 { font-size: 36px; margin: 0 0 4px; color: var(--magenta); text-shadow: 0 0 14px rgba(255,54,212,0.4); }
  h2 { font-size: 24px; margin: 48px 0 14px; padding-bottom: 6px; border-bottom: 1px solid var(--border); color: var(--cyan); }
  h3 { font-size: 19px; margin: 32px 0 10px; color: var(--fg); }
  h4 { font-size: 16px; margin: 18px 0 8px; color: var(--violet); }
  p { margin: 8px 0 12px; color: var(--fg); }
  ul, ol { margin: 8px 0 14px; padding-left: 24px; }
  li { margin: 4px 0; }
  blockquote {
    margin: 14px 0;
    padding: 10px 16px;
    border-left: 3px solid var(--violet);
    background: rgba(160,112,255,0.06);
    color: var(--fg-dim);
    font-size: 14px;
  }
  blockquote > :first-child { margin-top: 0; }
  blockquote > :last-child { margin-bottom: 0; }
  hr { border: none; border-top: 1px dashed var(--border); margin: 38px 0; }
  a { color: var(--cyan); }
  code {
    font-family: "JetBrains Mono", monospace;
    font-size: 0.9em;
    background: var(--bg-1);
    padding: 1px 6px;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--green);
  }
  pre {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 14px 16px;
    overflow: auto;
    border-radius: 2px;
    font-family: "JetBrains Mono", monospace;
    font-size: 12.5px;
    line-height: 1.5;
    color: var(--green);
    text-shadow: 0 0 4px rgba(57,255,136,0.25);
    box-shadow: inset 0 0 0 1px rgba(57,255,136,0.05);
  }
  pre code { background: transparent; border: none; padding: 0; color: inherit; }
  /* ASCII mocks - use cyan instead of green */
  pre:not([class]) { color: var(--cyan); text-shadow: 0 0 4px rgba(0,240,255,0.25); }
  table {
    border-collapse: collapse;
    margin: 14px 0;
    font-size: 13px;
    width: 100%;
  }
  th, td {
    border: 1px solid var(--border);
    padding: 6px 10px;
    text-align: left;
    vertical-align: top;
  }
  th {
    background: rgba(0,240,255,0.06);
    color: var(--cyan);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-size: 11px;
  }
  tbody tr:nth-child(even) td { background: rgba(10,10,24,0.5); }
  strong { color: var(--fg); font-weight: 700; }
  em { color: var(--yellow); font-style: normal; }
  /* TOC */
  .toc {
    position: fixed;
    top: 70px; right: 24px;
    width: 220px;
    max-height: calc(100vh - 100px);
    overflow: auto;
    padding: 12px 14px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    font-family: "JetBrains Mono", monospace;
    font-size: 11.5px;
    line-height: 1.7;
  }
  .toc-title { color: var(--magenta); text-shadow: 0 0 6px rgba(255,54,212,0.5); font-weight: 700; margin-bottom: 6px; letter-spacing: 0.04em; }
  .toc a { display: block; color: var(--fg-dim); text-decoration: none; padding: 1px 0; }
  .toc a:hover { color: var(--fg); }
  .toc a.h3 { padding-left: 12px; color: var(--fg-mute); }
  @media (max-width: 1280px) {
    .toc { display: none; }
  }
</style>
</head>
<body>
  <div class="topbar">
    <span class="brand">◆ license-manager · handoff</span>
    <span style="color: var(--fg-mute)">v0.4.0-dev · pour Claude Code</span>
    <span style="flex: 1"></span>
    <a href="index.html">← retour au prototype TUI</a>
  </div>
  <nav class="toc" id="toc">
    <div class="toc-title">SECTIONS</div>
  </nav>
  <main id="content">Chargement…</main>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script>
    (async () => {
      const res = await fetch("Handoff.md");
      const text = await res.text();
      const html = marked.parse(text, { breaks: false, gfm: true });
      document.getElementById("content").innerHTML = html;

      // build TOC from h2 + h3
      const headings = document.querySelectorAll("#content h2, #content h3");
      const toc = document.getElementById("toc");
      headings.forEach((h, i) => {
        const id = "h-" + i;
        h.id = id;
        const a = document.createElement("a");
        a.href = "#" + id;
        a.textContent = h.textContent;
        a.className = h.tagName.toLowerCase();
        toc.appendChild(a);
      });
    })();
  </script>
</body>
</html>
