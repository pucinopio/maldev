name: docs

on:
  push:
    branches: [master]
    paths:
      - "**/doc.go"
      - "docs/**"
      - "README.md"
      - "internal/tools/docgen/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "**/doc.go"
      - "docs/**"
      - "README.md"
      - "internal/tools/docgen/**"

permissions:
  contents: read

jobs:
  check:
    name: docgen drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Verify autogen tables are up to date
        run: |
          go run ./internal/tools/docgen --check
        # If this fails, the contributor needs to run:
        #   go run ./internal/tools/docgen
        # locally and commit the result. The pre-commit hook in
        # scripts/pre-commit catches this before push when installed via
        # `git config core.hooksPath scripts`.

      - name: Strict broken-link check
        run: |
          python3 scripts/check-doc-links.py
        # If this fails, the offending links are printed with their
        # source file. Either fix the target path or remove the link.
        # Only .md→.md links are validated (http URLs are network-flaky;
        # pure anchor links #section are not checked).
